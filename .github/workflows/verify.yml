name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Check generated compatibility userscript is committed
        run: git diff --exit-code -- DailyLoopRunner.user.js
